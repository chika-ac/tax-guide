<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周知作成 - editor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Meiryo UI', Meiryo, 'Yu Gothic UI', sans-serif; background: #f4f6fb; color: #222; }
  header { background: #1a3a6b; color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 1.2rem; font-weight: 700; }
  header a { color: #9db8f0; font-size: 0.85rem; text-decoration: none; margin-left: auto; }
  header a:hover { text-decoration: underline; }

  /* フォルダバー */
  .folder-bar {
    background: #fff;
    border-bottom: 2px solid #e0e8f8;
    padding: 9px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    font-size: 0.82rem;
  }
  .folder-bar .fl { color: #666; }
  .badge-connected { background:#e6f7f1; color:#1d7a5a; border:1px solid #a8dfc8; border-radius:5px; padding:3px 10px; font-weight:700; }
  .badge-reconnect  { background:#fff8e6; color:#8a5700; border:1px solid #f0d080; border-radius:5px; padding:3px 10px; font-weight:700; }
  .badge-none       { color:#999; }

  main { max-width: 860px; margin: 0 auto; padding: 18px 16px 48px; display: flex; flex-direction: column; gap: 14px; }
  .card { background: #fff; border-radius: 10px; border: 1px solid #dde4f4; padding: 16px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .card-title { font-size: 0.9rem; font-weight: 700; color: #1a3a6b; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #e0e8f8; display: flex; align-items: center; gap: 8px; }
  .step-badge { background: #3a6fd8; color: #fff; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }

  .btn { padding: 7px 14px; border: none; border-radius: 6px; font-size: 0.85rem; font-family: inherit; cursor: pointer; font-weight: 600; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.82; }
  .btn-sm { padding: 4px 10px; font-size: 0.8rem; }
  .btn-secondary { background: #e8eef8; color: #1a3a6b; }
  .btn-success { background: #1d9e75; color: #fff; font-size: 0.95rem; padding: 10px 24px; }
  .btn-remove { background: #f0f2f8; color: #999; border: none; border-radius: 6px; padding: 5px 9px; cursor: pointer; }
  .btn-remove:hover { background: #ffe0e0; color: #c00; }

  .date-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  input[type="date"] { padding: 7px 10px; border: 1.5px solid #b0c4e8; border-radius: 6px; font-size: 0.95rem; font-family: inherit; }

  .items-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 10px; }
  .item-row { display: flex; gap: 8px; align-items: flex-start; }
  .item-row textarea { flex: 1; padding: 7px 10px; border: 1.5px solid #c8d4ec; border-radius: 6px; font-size: 0.92rem; font-family: inherit; resize: none; min-height: 38px; overflow: hidden; line-height: 1.5; }
  .item-row textarea:focus { outline: none; border-color: #3a6fd8; }

  .tabs { display: flex; gap: 3px; flex-wrap: wrap; }
  .tab-btn { padding: 7px 15px; border: 2px solid #dde4f4; border-bottom: none; border-radius: 6px 6px 0 0; background: #f0f4fc; color: #666; font-family: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
  .tab-btn.active { background: #fff; color: var(--tc); border-color: var(--tc); }
  .tab-panel { display: none; border: 2px solid #dde4f4; border-radius: 0 8px 8px 8px; padding: 14px; }
  .tab-panel.active { display: block; }

  .preview-area { background: #f8faff; border: 1.5px solid #dde4f8; border-radius: 8px; padding: 14px; font-size: 0.88rem; white-space: pre-wrap; word-break: break-word; min-height: 60px; font-family: 'Meiryo UI', Meiryo, monospace; line-height: 1.7; }

  .drop-zone { border: 2px dashed #b0c4e8; border-radius: 6px; padding: 10px; text-align: center; color: #6a85b8; font-size: 0.82rem; cursor: pointer; transition: background 0.15s; position: relative; }
  .drop-zone:hover, .drop-zone.dragover { background: #eef3ff; border-color: #3a6fd8; }
  .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

  .sched-badge { display: inline-block; background: #fff3cd; border: 1px solid #e6b030; color: #8a5700; border-radius: 4px; font-size: 0.78rem; padding: 2px 8px; margin-bottom: 8px; }
  .status-chip { display: inline-block; background: #e6f7f1; color: #1d7a5a; border: 1px solid #a8dfc8; border-radius: 4px; font-size: 0.78rem; padding: 2px 8px; margin: 2px; }
  .msg { font-size: 0.84rem; padding: 6px 12px; border-radius: 6px; margin-top: 8px; }
  .msg-success { background: #e6f7f1; color: #1d7a5a; border: 1px solid #a8dfc8; }
  .msg-warn    { background: #fff8e6; color: #8a6200; border: 1px solid #f0d080; }
  details summary { cursor: pointer; font-size: 0.82rem; color: #3a6fd8; user-select: none; margin-top: 10px; }
  .sched-suggestion { background: #fff8e6; border: 1px solid #f0d080; color: #7a5500; border-radius: 6px; padding: 10px 14px; font-size: 0.84rem; margin-top: 8px; }
  .sched-suggestion ul { margin: 4px 0 8px 16px; }
</style>
</head>
<body>

<header>
  <h1>周知作成 — editor</h1>
  <a href="index.html">← 閲覧に戻る</a>
</header>

<!-- フォルダバー -->
<div class="folder-bar">
  <span class="fl">📁 データフォルダ:</span>
  <span id="folderStatus"><span class="badge-none">未接続</span></span>
  <button class="btn btn-secondary btn-sm" id="folderBtn" onclick="folderAction()">フォルダを選択</button>
  <button class="btn btn-secondary btn-sm" onclick="reloadSchedule()" title="calendar.htmlで更新した場合にクリック">↺ スケジュール再読み込み</button>
  <label class="btn btn-secondary btn-sm" style="cursor:pointer;" title="フォルダ選択が使えない場合の代替方法">
    📂 代替：ファイルを選択
    <input type="file" id="altFolderInput" webkitdirectory accept=".json" style="display:none" onchange="loadFromFileInput(this.files)">
  </label>
  <span id="folderMsg"></span>
</div>

<main>

  <!-- Step 1: 日付 -->
  <div class="card">
    <div class="card-title"><span class="step-badge">1</span>対象日付</div>
    <div class="date-row">
      <input type="date" id="targetDate">
      <button class="btn btn-secondary" onclick="setToday()">今日に戻す</button>
      <span id="dateLabel" style="font-size:0.9rem;color:#555;"></span>
    </div>
    <div id="loadStatusArea" style="margin-top:8px;min-height:22px;"></div>
    <div id="schedSuggestion" style="display:none;"></div>

    <details>
      <summary>手動読み込み（Chromeなどfetchが無効の場合）</summary>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
        <div>
          <div style="font-size:0.78rem;font-weight:600;color:#666;margin-bottom:3px;">YYYY-MM-DD.json</div>
          <div class="drop-zone" id="jsonDrop">
            <input type="file" accept=".json" onchange="onDayFileSelect(this.files[0])">
            <span id="jsonDropLabel">ドロップ / クリック</span>
          </div>
        </div>
        <div>
          <div style="font-size:0.78rem;font-weight:600;color:#666;margin-bottom:3px;">schedule.json</div>
          <div class="drop-zone" id="schedDrop">
            <input type="file" accept=".json" onchange="onSchedFileSelect(this.files[0])">
            <span id="schedDropLabel">ドロップ / クリック</span>
          </div>
        </div>
      </div>
    </details>
  </div>

  <!-- Step 2: チーム別（上部に配置） -->
  <div class="card">
    <div class="card-title"><span class="step-badge">2</span>チーム別のお知らせ</div>
    <div class="tabs" id="teamTabs"></div>
    <div id="teamPanels"></div>
  </div>

  <!-- Step 3: 全員共通 -->
  <div class="card">
    <div class="card-title"><span class="step-badge">3</span>全員共通のお知らせ</div>
    <div id="schedBadge"></div>
    <div class="items-list" id="commonList"></div>
    <button class="btn btn-secondary" onclick="addCommonItem('')">＋ 項目を追加</button>
  </div>

  <!-- Step 4: プレビュー -->
  <div class="card">
    <div class="card-title"><span class="step-badge">4</span>プレビュー</div>
    <div class="preview-area" id="preview"></div>
  </div>

  <!-- Step 5: 保存 -->
  <div class="card">
    <div class="card-title"><span class="step-badge">5</span>保存</div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <button class="btn btn-success" onclick="saveJSON()">💾 保存</button>
      <span id="dlFilename" style="font-size:0.82rem;color:#888;"></span>
    </div>
    <div id="dlMsg"></div>
  </div>

</main>
<script>
const TEAMS  = ['営業チーム','技術チーム','総合チーム','企画チーム','物流チーム'];
const COLORS = ['#3a6fd8','#1d9e75','#d85a30','#7f77dd','#ba7517'];

let scheduleData    = null;
let dataFolderHandle = null;
let savedHandle     = null;   // IDBから復元済み・権限待ち
let activeTab       = 0;
const statusMap     = {};
let pendingSuggestions = [];
let fileCache = {};

// ---- 起動 ----
const dateInput = document.getElementById('targetDate');
dateInput.value = fmtDate(new Date());
dateInput.addEventListener('change', onDateChange);
updateDateLabel();
buildTabs();
buildPanels();

(async () => {
  await tryRestoreFolder();       // IDBからフォルダ復元を試みる
  if (!dataFolderHandle) {        // 復元できなかった場合はfetchで補完
    await tryFetchSchedule();
    await loadCurrentDate();
  }
  updatePreview();
})();

// ===== IndexedDB =====
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('朝礼周知', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('handles');
    req.onsuccess  = e => resolve(e.target.result);
    req.onerror    = ()  => reject(req.error);
  });
}
async function saveHandleIDB(handle) {
  try {
    const db = await openDB();
    await new Promise((res, rej) => {
      const tx = db.transaction('handles', 'readwrite');
      tx.objectStore('handles').put(handle, 'dataFolder');
      tx.oncomplete = res;
      tx.onerror    = () => rej(tx.error);
    });
  } catch(e) { console.warn('IDB save:', e); }
}
async function loadHandleIDB() {
  try {
    const db = await openDB();
    return await new Promise((res, rej) => {
      const tx  = db.transaction('handles', 'readonly');
      const req = tx.objectStore('handles').get('dataFolder');
      req.onsuccess = () => res(req.result || null);
      req.onerror   = () => rej(req.error);
    });
  } catch { return null; }
}

// ===== フォルダ復元・接続 =====
async function tryRestoreFolder() {
  const handle = await loadHandleIDB();
  if (!handle) { setFolderUI(null); return; }
  try {
    const perm = await handle.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      // 権限が残っていれば即接続
      dataFolderHandle = handle;
      setFolderUI('connected');
      await loadScheduleFromHandle();
      await loadCurrentDate();
    } else {
      // 権限が失効→「再接続」ボタンを表示
      savedHandle = handle;
      setFolderUI('reconnect');
    }
  } catch { setFolderUI(null); }
}

async function folderAction() {
  if (savedHandle && !dataFolderHandle) {
    // 再接続（ユーザー操作が必要なのでボタンクリックから呼ぶ）
    try {
      const perm = await savedHandle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        dataFolderHandle = savedHandle;
        savedHandle = null;
        setFolderUI('connected');
        await loadScheduleFromHandle();
        await loadCurrentDate();
        updatePreview();
      }
    } catch(e) { if (e.name !== 'AbortError') console.error(e); }
  } else {
    // 新しいフォルダを選択
    if (!window.showDirectoryPicker) {
      setFolderMsg('このブラウザはフォルダ選択に未対応です。Edgeをご利用ください。');
      return;
    }
    try {
      const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
      dataFolderHandle = handle;
      savedHandle = null;
      await saveHandleIDB(handle);
      setFolderUI('connected');
      await loadScheduleFromHandle();
      await loadCurrentDate();
      updatePreview();
    } catch(e) { if (e.name !== 'AbortError') console.error(e); }
  }
}

function setFolderUI(state) {
  const st  = document.getElementById('folderStatus');
  const btn = document.getElementById('folderBtn');
  if (state === 'connected') {
    st.innerHTML   = '<span class="badge-connected">✓ 接続済み（直接保存モード）</span>';
    btn.textContent = '別のフォルダを選択';
  } else if (state === 'reconnect') {
    st.innerHTML   = '<span class="badge-reconnect">⚠ 前回のフォルダが見つかりました</span>';
    btn.textContent = '再接続する';
  } else {
    st.innerHTML   = '<span class="badge-none">未接続（Edgeでは自動読み込みが有効）</span>';
    btn.textContent = 'フォルダを選択';
  }
  setFolderMsg('');
}
function setFolderMsg(msg) {
  document.getElementById('folderMsg').textContent = msg;
}

// ===== ファイル読み書き（フォルダハンドル経由） =====
async function readHandle(name) {
  if (!dataFolderHandle) return null;
  try {
    const fh   = await dataFolderHandle.getFileHandle(name);
    const file = await fh.getFile();
    return JSON.parse(await file.text());
  } catch { return null; }
}
async function writeHandle(name, text) {
  if (!dataFolderHandle) return false;
  try {
    const fh = await dataFolderHandle.getFileHandle(name, { create: true });
    const w  = await fh.createWritable();
    await w.write(new TextEncoder().encode(text));
    await w.close();
    return true;
  } catch(e) { console.error(e); return false; }
}

// ===== スケジュール読み込み =====
async function loadScheduleFromHandle() {
  const d = await readHandle('schedule.json');
  if (d) { scheduleData = d; setStatus('sched', '予定マスター読込済'); }
  else { scheduleData = null; }
}
async function tryFetchSchedule() {
  try {
    const r = await fetch('data/schedule.json');
    if (r.ok) { scheduleData = await r.json(); setStatus('sched', '予定マスター自動読込済'); }
    else scheduleData = null;
  } catch { scheduleData = null; }
}

// ===== 代替：webkitdirectory でフォルダ内ファイルを一括読み込み =====
function loadFromFileInput(files) {
  fileCache = {};
  const readers = [];
  for (const file of files) {
    if (!file.name.endsWith('.json')) continue;
    readers.push(new Promise(resolve => {
      const r = new FileReader();
      r.onload = e => {
        try { fileCache[file.name] = JSON.parse(e.target.result); } catch {}
        resolve();
      };
      r.readAsText(file, 'UTF-8');
    }));
  }
  Promise.all(readers).then(async () => {
    if (fileCache['schedule.json']) {
      scheduleData = fileCache['schedule.json'];
      setStatus('sched', '予定マスター読込済');
    }
    const st = document.getElementById('folderStatus');
    st.innerHTML = '<span class="badge-connected">✓ 読み込み完了（代替モード）</span>';
    showMsg('folderMsg', Object.keys(fileCache).length + '件のファイルを読み込みました。保存後は手動で data/ フォルダへコピーしてください。', 'warn');
    await loadCurrentDate();
    updatePreview();
  });
}

// ===== スケジュール手動再読み込み =====
async function reloadSchedule() {
  scheduleData = null;
  if (dataFolderHandle) await loadScheduleFromHandle();
  else await tryFetchSchedule();
  if (scheduleData) {
    showMsg('folderMsg', '✓ schedule.json を再読み込みしました。', 'success');
    // 新しい日付データがない場合のみスケジュールを再適用
    const hasDay = (statusMap['day'] || '').includes('読込済');
    if (!hasDay) {
      clearForm();
      addCommonItem('');
      TEAMS.forEach((t, i) => addTeamItem(i, ''));
      applySchedule();
      updatePreview();
    } else {
      checkScheduleSuggestion(dateInput.value);
    }
  } else {
    showMsg('folderMsg', 'schedule.json が見つかりませんでした。', 'warn');
  }
}

// ===== 日付データ読み込み =====
async function loadCurrentDate() {
  const ds = dateInput.value;
  if (!ds) return;

  clearForm();   // 常に先にリセット（二重挿入を防ぐ）

  // 日付変更のたびに最新のschedule.jsonを再読み込み
  if (dataFolderHandle) await loadScheduleFromHandle();
  else await tryFetchSchedule();
  if (!scheduleData && fileCache['schedule.json']) {
    scheduleData = fileCache['schedule.json'];
    setStatus('sched', '予定マスター読込済');
  }

  let data = null;
  if (dataFolderHandle) data = await readHandle(ds + '.json');
  if (!data) {
    try { const r = await fetch('data/' + ds + '.json'); if (r.ok) data = await r.json(); } catch {}
  }
  if (!data && fileCache[ds + '.json']) data = fileCache[ds + '.json'];

  if (data) {
    populateForm(data);
    setStatus('day', ds + '.json 読込済');
    checkScheduleSuggestion(ds);
  } else {
    addCommonItem('');
    TEAMS.forEach((t, i) => addTeamItem(i, ''));
    if (scheduleData) applySchedule();
    setStatus('day', null);
  }
}

async function onDateChange() {
  updateDateLabel();
  await loadCurrentDate();
  updatePreview();
}
function setToday() {
  dateInput.value = fmtDate(new Date());
  onDateChange();
}

// ===== ステータスチップ =====
function setStatus(key, val) {
  statusMap[key] = val;
  document.getElementById('loadStatusArea').innerHTML =
    Object.values(statusMap).filter(Boolean)
      .map(v => `<span class="status-chip">${esc(v)}</span>`).join('');
}

// ===== 手動読み込み（D&D / ファイル選択） =====
function onDayFileSelect(f) {
  if (!f) return;
  readJSON(f, data => {
    clearForm(); populateForm(data);
    document.getElementById('jsonDropLabel').innerHTML = `<span style="color:#1d9e75;font-weight:700;">✓ ${esc(f.name)}</span>`;
    setStatus('day', f.name + ' 手動読込済'); updatePreview();
  });
}
function onSchedFileSelect(f) {
  if (!f) return;
  readJSON(f, data => {
    scheduleData = data;
    document.getElementById('schedDropLabel').innerHTML = `<span style="color:#1d9e75;font-weight:700;">✓ ${esc(f.name)}</span>`;
    setStatus('sched', '予定マスター手動読込済');
    const empty = getVals('commonList').length === 0 && TEAMS.every((t,i) => getVals('list-'+i).length === 0);
    if (empty) applySchedule();
    updatePreview();
  });
}
function readJSON(file, cb) {
  const r = new FileReader();
  r.onload = e => { try { cb(JSON.parse(e.target.result)); } catch { alert('JSON解析失敗'); } };
  r.readAsText(file, 'UTF-8');
}
['jsonDrop','schedDrop'].forEach(id => {
  const z = document.getElementById(id);
  z.addEventListener('dragover', e => { e.preventDefault(); z.classList.add('dragover'); });
  z.addEventListener('dragleave', () => z.classList.remove('dragover'));
  z.addEventListener('drop', e => {
    e.preventDefault(); z.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f) (id === 'jsonDrop' ? onDayFileSelect : onSchedFileSelect)(f);
  });
});

// ===== タブ構築（インデックスベース） =====
function buildTabs() {
  document.getElementById('teamTabs').innerHTML = TEAMS.map((t, i) =>
    `<button class="tab-btn${i===0?' active':''}" style="--tc:${COLORS[i]}" id="tab-${i}" onclick="switchTab(${i})">${esc(t)}</button>`
  ).join('');
}
function buildPanels() {
  document.getElementById('teamPanels').innerHTML = TEAMS.map((t, i) =>
    `<div class="tab-panel${i===0?' active':''}" id="panel-${i}">
      <div class="items-list" id="list-${i}"></div>
      <button class="btn btn-secondary" onclick="addTeamItem(${i},'')">＋ 項目を追加</button>
    </div>`
  ).join('');
}
function switchTab(idx) {
  TEAMS.forEach((t, i) => {
    document.getElementById('tab-'+i).classList.toggle('active', i===idx);
    document.getElementById('panel-'+i).classList.toggle('active', i===idx);
  });
  activeTab = idx;
}

// ===== フォーム操作 =====
function makeRow(ph, val) {
  const row = document.createElement('div');
  row.className = 'item-row';
  const ta = document.createElement('textarea');
  ta.rows = 1; ta.placeholder = ph; ta.value = val || '';
  ta.addEventListener('input', () => { resize(ta); updatePreview(); });
  const btn = document.createElement('button');
  btn.className = 'btn-remove'; btn.textContent = '✕';
  btn.addEventListener('click', () => { row.remove(); updatePreview(); });
  row.appendChild(ta); row.appendChild(btn);
  requestAnimationFrame(() => resize(ta));
  return row;
}
function addCommonItem(val) {
  document.getElementById('commonList').appendChild(makeRow('共通のお知らせを入力', val));
}
function addTeamItem(i, val) {
  const list = document.getElementById('list-'+i);
  if (list) list.appendChild(makeRow(TEAMS[i]+'の連絡事項を入力', val));
}
function clearForm() {
  document.getElementById('commonList').innerHTML   = '';
  document.getElementById('schedBadge').innerHTML   = '';
  TEAMS.forEach((t, i) => { document.getElementById('list-'+i).innerHTML = ''; });
  statusMap['day'] = null;
  document.getElementById('loadStatusArea').innerHTML =
    Object.values(statusMap).filter(Boolean)
      .map(v => `<span class="status-chip">${esc(v)}</span>`).join('');
}
function populateForm(data) {
  // clearForm()はloadCurrentDate側で呼び済みだが念のためクリア
  document.getElementById('commonList').innerHTML = '';
  TEAMS.forEach((t, i) => { document.getElementById('list-'+i).innerHTML = ''; });
  document.getElementById('schedBadge').innerHTML = '';
  const common = data.common || [];
  common.forEach(v => addCommonItem(v));
  if (!common.length) addCommonItem('');
  TEAMS.forEach((t, i) => {
    const items = (data.teams||{})[t] || [];
    items.forEach(v => addTeamItem(i, v));
    if (!items.length) addTeamItem(i, '');
  });
}
function applySchedule() {
  if (!scheduleData || !dateInput.value) return;
  const items = getScheduleForDate(dateInput.value, scheduleData);
  if (!items.length) return;
  document.getElementById('schedBadge').innerHTML =
    `<div class="sched-badge">予定マスターから ${items.length} 件を展開しました</div>`;
  const list = document.getElementById('commonList');
  for (const item of [...items].reverse())
    list.insertBefore(makeRow('共通のお知らせを入力', item), list.firstChild);
  updatePreview();
}

// ===== JSON組み立て =====
function buildJSON() {
  return {
    date:  dateInput.value,
    common: getVals('commonList'),
    teams:  Object.fromEntries(TEAMS.map((t, i) => [t, getVals('list-'+i)]))
  };
}
function getVals(id) {
  const el = document.getElementById(id);
  if (!el) return [];
  return Array.from(el.querySelectorAll('textarea')).map(t => t.value.trim()).filter(Boolean);
}

// ===== プレビュー =====
function updatePreview() {
  const d = buildJSON();
  const lines = ['【'+(d.date||'----')+' 朝礼周知】'];
  if (d.common.length) {
    lines.push('', '＜全員共通＞');
    d.common.forEach((v, i) => lines.push((i+1)+'. '+v));
  }
  TEAMS.forEach((t, i) => {
    const it = d.teams[t] || [];
    if (it.length) { lines.push('', '＜'+t+'＞'); it.forEach((v,j) => lines.push((j+1)+'. '+v)); }
  });
  document.getElementById('preview').textContent   = lines.join('\n');
  document.getElementById('dlFilename').textContent = d.date ? d.date+'.json' : '';
}

// ===== 保存 =====
async function saveJSON() {
  const d = buildJSON();
  if (!d.date) { showMsg('dlMsg','日付を指定してください。','warn'); return; }
  const json  = JSON.stringify(d, null, 2);
  const fname = d.date + '.json';

  updateIndexCache(fname, d);

  // 1) フォルダハンドル経由で直接保存
  if (dataFolderHandle) {
    if (await writeHandle(fname, json)) {
      showMsg('dlMsg','✓ data/'+fname+' に保存しました。','success'); return;
    }
    showMsg('dlMsg','直接保存に失敗しました。ダウンロードを試みます。','warn');
  }

  // 2) 保存ダイアログ（showSaveFilePicker）
  if (window.showSaveFilePicker) {
    try {
      const h = await window.showSaveFilePicker({
        suggestedName: fname,
        types: [{ description:'JSON', accept:{'application/json':['.json']} }]
      });
      const w = await h.createWritable();
      await w.write(new TextEncoder().encode(json));
      await w.close();
      showMsg('dlMsg','✓ '+fname+' を保存しました。','success'); return;
    } catch(e) { if (e.name==='AbortError') return; }
  }

  // 3) フォールバック：ブラウザダウンロード
  const blob = new Blob([json], { type:'application/json;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a'); a.href=url; a.download=fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showMsg('dlMsg', fname+' をダウンロードしました。data/ フォルダに保存してください。','success');
}

function updateIndexCache(fname, data) {
  try {
    const raw = localStorage.getItem('fileCache_index');
    const cache = raw ? JSON.parse(raw) : [];
    const idx = cache.findIndex(r => r.name === fname);
    if (idx >= 0) cache[idx] = { name: fname, data };
    else cache.push({ name: fname, data });
    localStorage.setItem('fileCache_index', JSON.stringify(cache));
  } catch(e) { console.warn('cache update:', e); }
}

// ===== ユーティリティ =====
function fmtDate(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function updateDateLabel() {
  const v = dateInput.value;
  if (!v) { document.getElementById('dateLabel').textContent=''; return; }
  const d  = new Date(v+'T00:00:00');
  const dn = '日月火水木金土';
  document.getElementById('dateLabel').textContent =
    d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+dn[d.getDay()]+'）';
}
function resize(el) { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showMsg(id, text, type) {
  const el = document.getElementById(id); if (!el) return;
  el.innerHTML = `<div class="msg msg-${type}">${esc(text)}</div>`;
  setTimeout(() => { el.innerHTML=''; }, 6000);
}

// ===== 予定マスター判定ロジック =====
function getScheduleForDate(ds, sch) {
  const date = new Date(ds+'T00:00:00'), res = [];
  for (const it of (sch.recurring||[])) if (matchRule(date, it)) res.push('【定例】'+it.title);
  for (const ev of (sch.events||[]))    if (ev.date === ds)      res.push(ev.title);
  return res;
}
function matchRule(date, it) {
  const dow = date.getDay();
  switch (it.rule) {
    case 'every-week': return dow === it.dow;
    case 'every-2weeks': {
      if (dow !== it.dow) return false;
      const wk = Math.floor((date - new Date('2025-01-06T00:00:00')) / (7*86400000));
      return wk >= 0 && wk % 2 === 0;
    }
    case 'every-month-week': {
      if (dow !== it.dow) return false;
      const y=date.getFullYear(), mo=date.getMonth(), d=date.getDate();
      let cnt=0; for (let x=1; x<=d; x++) if (new Date(y,mo,x).getDay()===it.dow) cnt++;
      return cnt === it.week;
    }
    case 'every-month-day': return date.getDate() === it.day;
    case 'every-2months': {
      if (dow !== it.dow) return false;
      return ((date.getFullYear()-2025)*12 + date.getMonth()) % 2 === 0;
    }
    default: return false;
  }
}

// ===== スケジュール未反映の提案バナー =====
function checkScheduleSuggestion(ds) {
  const el = document.getElementById('schedSuggestion');
  el.style.display = 'none';
  el.innerHTML = '';
  pendingSuggestions = [];
  if (!scheduleData) return;
  const schedItems = getScheduleForDate(ds, scheduleData);
  if (!schedItems.length) return;
  const existingCommon = getVals('commonList');
  pendingSuggestions = schedItems.filter(item => !existingCommon.includes(item));
  if (!pendingSuggestions.length) return;
  el.style.display = 'block';
  el.innerHTML =
    `<div class="sched-suggestion">` +
    `<strong>予定マスターに未反映の項目があります（${pendingSuggestions.length}件）</strong>` +
    `<ul>${pendingSuggestions.map(s => `<li>${esc(s)}</li>`).join('')}</ul>` +
    `<button class="btn btn-secondary btn-sm" onclick="addSuggestedItems()">共通欄に追加する</button>` +
    `</div>`;
}
function addSuggestedItems() {
  const list = document.getElementById('commonList');
  for (const item of pendingSuggestions)
    list.insertBefore(makeRow('共通のお知らせを入力', item), list.firstChild);
  document.getElementById('schedSuggestion').style.display = 'none';
  pendingSuggestions = [];
  updatePreview();
}
