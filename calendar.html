<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予定マスター管理 - calendar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Meiryo UI', Meiryo, 'Yu Gothic UI', sans-serif; background: #f4f6fb; color: #222; min-height: 100vh; }

  header { background: #1a3a6b; color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.18); }
  header h1 { font-size: 1.2rem; font-weight: 700; }
  header a { color: #9db8f0; font-size: 0.85rem; text-decoration: none; margin-left: auto; }
  header a:hover { text-decoration: underline; }

  /* フォルダバー */
  .folder-bar { background: #fff; border-bottom: 2px solid #e0e8f8; padding: 8px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 0.82rem; }
  .folder-bar .fl { color: #666; }
  .badge-connected { background:#e6f7f1; color:#1d7a5a; border:1px solid #a8dfc8; border-radius:5px; padding:3px 10px; font-weight:700; }
  .badge-reconnect  { background:#fff8e6; color:#8a5700; border:1px solid #f0d080; border-radius:5px; padding:3px 10px; font-weight:700; }
  .badge-none       { color:#999; }

  main { max-width: 900px; margin: 0 auto; padding: 20px 16px 48px; display: flex; flex-direction: column; gap: 16px; }

  .card { background: #fff; border-radius: 10px; border: 1px solid #dde4f4; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .card-title { font-size: 0.95rem; font-weight: 700; color: #1a3a6b; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid #e0e8f8; display: flex; align-items: center; gap: 8px; }

  .form-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 0.8rem; color: #555; font-weight: 600; }
  input[type="date"], input[type="text"], input[type="number"], select {
    padding: 7px 10px; border: 1.5px solid #b0c4e8; border-radius: 6px;
    font-size: 0.92rem; font-family: inherit; color: #222; background: #fff;
  }
  input[type="text"] { min-width: 200px; }
  select { min-width: 140px; }

  .btn { padding: 7px 16px; border: none; border-radius: 6px; font-size: 0.88rem; font-family: inherit; cursor: pointer; font-weight: 600; transition: opacity 0.15s; align-self: flex-end; }
  .btn:hover { opacity: 0.82; }
  .btn-sm { padding: 4px 10px; font-size: 0.8rem; align-self: auto; }
  .btn-primary   { background: #3a6fd8; color: #fff; }
  .btn-secondary { background: #e8eef8; color: #1a3a6b; }
  .btn-success   { background: #1d9e75; color: #fff; padding: 10px 24px; font-size: 0.95rem; }

  .paste-area { width: 100%; min-height: 80px; padding: 10px; border: 1.5px solid #b0c4e8; border-radius: 6px; font-family: 'Meiryo UI', Meiryo, monospace; font-size: 0.88rem; resize: vertical; margin-bottom: 10px; }
  .paste-area:focus { outline: none; border-color: #3a6fd8; }

  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th { background: #eef3ff; color: #1a3a6b; padding: 8px 12px; text-align: left; font-weight: 700; border-bottom: 2px solid #c8d8f8; }
  td { padding: 7px 12px; border-bottom: 1px solid #eef0f8; vertical-align: middle; }
  tr:hover td { background: #f8faff; }
  .highlight-today td { background: #fffbe6 !important; }
  .highlight-today td:first-child { font-weight: 700; color: #8a5700; }
  .btn-del { background: #f0f2f8; color: #999; border: none; border-radius: 4px; padding: 3px 9px; cursor: pointer; font-size: 0.82rem; }
  .btn-del:hover { background: #ffe0e0; color: #c00; }

  .today-box { background: #fffbe6; border: 1.5px solid #e6b030; border-radius: 8px; padding: 12px 16px; margin-bottom: 4px; font-size: 0.88rem; }
  .today-box strong { color: #8a5700; }
  .today-box ul { list-style: none; padding: 0; margin-top: 6px; }
  .today-box li { padding: 2px 0 2px 14px; position: relative; }
  .today-box li::before { content: '▸'; position: absolute; left: 0; color: #e6b030; font-size: 0.72rem; top: 5px; }

  .drop-zone { border: 2px dashed #b0c4e8; border-radius: 6px; padding: 12px; text-align: center; color: #6a85b8; font-size: 0.85rem; cursor: pointer; transition: background 0.15s; position: relative; }
  .drop-zone:hover, .drop-zone.dragover { background: #eef3ff; border-color: #3a6fd8; }
  .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

  .status-chip { display: inline-block; background: #e6f7f1; color: #1d7a5a; border: 1px solid #a8dfc8; border-radius: 4px; font-size: 0.78rem; padding: 2px 8px; }
  .msg { font-size: 0.85rem; padding: 7px 12px; border-radius: 6px; margin-top: 8px; }
  .msg-success { background: #e6f7f1; color: #1d7a5a; border: 1px solid #a8dfc8; }
  .msg-warn    { background: #fff8e6; color: #8a6200; border: 1px solid #f0d080; }
  .extra-fields { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  details summary { cursor: pointer; font-size: 0.82rem; color: #3a6fd8; user-select: none; margin-top: 8px; }
</style>
</head>
<body>

<header>
  <h1>予定マスター管理 — calendar</h1>
  <a href="index.html">← 閲覧に戻る</a>
</header>

<!-- フォルダバー -->
<div class="folder-bar">
  <span class="fl">📁 データフォルダ:</span>
  <span id="folderStatus"><span class="badge-none">未接続</span></span>
  <button class="btn btn-secondary btn-sm" id="folderBtn" onclick="folderAction()">フォルダを選択</button>
  <label class="btn btn-secondary btn-sm" style="cursor:pointer;" title="フォルダ選択が使えない場合の代替方法">
    📂 代替：ファイルを選択
    <input type="file" id="altFolderInput" webkitdirectory accept=".json" style="display:none" onchange="loadFromFileInput(this.files)">
  </label>
  <span id="loadChip"></span>
</div>

<main>
  <!-- 今日の一致 -->
  <div id="todayBox"></div>

  <!-- 単発予定登録 -->
  <div class="card">
    <div class="card-title">単発予定の登録</div>
    <div class="form-row">
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="evDate">
      </div>
      <div class="form-group">
        <label>タイトル</label>
        <input type="text" id="evTitle" placeholder="例：クライアントA 最終確認" style="width:280px;">
      </div>
      <button class="btn btn-primary" onclick="addEvent()">追加</button>
    </div>
    <div id="evMsg"></div>

    <!-- コピー一括登録 -->
    <div style="margin-top:16px; border-top:1px solid #eef0f8; padding-top:14px;">
      <div style="font-size:0.88rem;font-weight:700;color:#555;margin-bottom:8px;">Excelコピー一括登録（A列:日付、B列:タイトル）</div>
      <textarea class="paste-area" id="pasteArea" placeholder="ExcelのA列（日付）とB列（タイトル）を選択してコピー＆ペースト&#10;例：&#10;2025/6/15&#9;クライアントA 最終確認&#10;2025/9/3&#9;展示会出展" onkeydown="if(event.key==='Tab'){event.preventDefault();const t=this,s=t.selectionStart,e=t.selectionEnd;t.value=t.value.slice(0,s)+'\t'+t.value.slice(e);t.selectionStart=t.selectionEnd=s+1;}"></textarea>
      <button class="btn btn-secondary" onclick="bulkImport()">一括取り込み</button>
      <div id="pasteMsg"></div>
    </div>
  </div>

  <!-- 定例予定登録 -->
  <div class="card">
    <div class="card-title">定例予定の登録</div>
    <div class="form-row">
      <div class="form-group">
        <label>タイトル</label>
        <input type="text" id="recTitle" placeholder="例：全体朝礼" style="width:220px;">
      </div>
      <div class="form-group">
        <label>パターン</label>
        <select id="recPattern" onchange="updateExtraFields()">
          <option value="every-week">毎週</option>
          <option value="every-2weeks">隔週</option>
          <option value="every-month-week">毎月第N週</option>
          <option value="every-month-day">毎月N日固定</option>
          <option value="every-2months">隔月</option>
        </select>
      </div>
      <div class="extra-fields" id="extraFields"></div>
      <button class="btn btn-primary" onclick="addRecurring()">追加</button>
    </div>
    <div id="recMsg"></div>
  </div>

  <!-- 登録済み一覧 -->
  <div class="card">
    <div class="card-title">登録済み一覧</div>
    <div style="margin-bottom:14px;">
      <strong style="font-size:0.85rem;color:#555;">単発予定</strong>
      <table style="margin-top:6px;">
        <thead><tr><th>日付</th><th>タイトル</th><th></th></tr></thead>
        <tbody id="eventTableBody"></tbody>
      </table>
    </div>
    <div>
      <strong style="font-size:0.85rem;color:#555;">定例予定</strong>
      <table style="margin-top:6px;">
        <thead><tr><th>パターン</th><th>タイトル</th><th></th></tr></thead>
        <tbody id="recurTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 保存 -->
  <div class="card">
    <div class="card-title">schedule.json を保存</div>
    <button class="btn btn-success" onclick="saveSchedule()">💾 保存</button>
    <div id="dlMsg"></div>
    <div id="dlInstruction" class="msg msg-warn" style="margin-top:12px;">
      保存後、<strong>data/</strong> フォルダに上書き配置してください。
    </div>
  </div>

</main>
<script>
const DOW_LABELS = ['','月','火','水','木','金','土'];
let events    = [];
let recurring = [];
let dataFolderHandle = null;
let savedHandle      = null;
let fileCache = {};

// ---- 初期化 ----
document.getElementById('evDate').value = fmtDate(new Date());
updateExtraFields();
renderTables();
renderTodayBox();

(async () => {
  await tryRestoreFolder();
  if (!dataFolderHandle) await tryFetchSchedule();
  if (!events.length && !recurring.length && fileCache['schedule.json']) {
    applyScheduleData(fileCache['schedule.json'], 'キャッシュから読み込みました');
  }
})();

// ===== IndexedDB（他ページと共通DB） =====
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('朝礼周知', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('handles');
    req.onsuccess  = e  => resolve(e.target.result);
    req.onerror    = () => reject(req.error);
  });
}
async function saveHandleIDB(handle) {
  try {
    const db = await openDB();
    await new Promise((res, rej) => {
      const tx = db.transaction('handles', 'readwrite');
      tx.objectStore('handles').put(handle, 'dataFolder');
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
  } catch(e) { console.warn('IDB save:', e); }
}
async function loadHandleIDB() {
  try {
    const db = await openDB();
    return await new Promise((res, rej) => {
      const tx  = db.transaction('handles', 'readonly');
      const req = tx.objectStore('handles').get('dataFolder');
      req.onsuccess = () => res(req.result || null);
      req.onerror   = () => rej(req.error);
    });
  } catch { return null; }
}

// ===== フォルダ復元・接続 =====
async function tryRestoreFolder() {
  const handle = await loadHandleIDB();
  if (!handle) { setFolderUI(null); return; }
  try {
    const perm = await handle.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      dataFolderHandle = handle;
      setFolderUI('connected');
      await loadScheduleFromHandle();
    } else {
      savedHandle = handle;
      setFolderUI('reconnect');
    }
  } catch { setFolderUI(null); }
}

async function folderAction() {
  if (savedHandle && !dataFolderHandle) {
    try {
      const perm = await savedHandle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        dataFolderHandle = savedHandle;
        savedHandle = null;
        setFolderUI('connected');
        await loadScheduleFromHandle();
      }
    } catch(e) { if (e.name !== 'AbortError') console.error(e); }
  } else {
    if (!window.showDirectoryPicker) {
      alert('このブラウザはフォルダ選択に未対応です。Edgeをご利用ください。');
      return;
    }
    try {
      const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
      dataFolderHandle = handle;
      savedHandle = null;
      await saveHandleIDB(handle);
      setFolderUI('connected');
      await loadScheduleFromHandle();
    } catch(e) { if (e.name !== 'AbortError') console.error(e); }
  }
}

function setFolderUI(state) {
  const st  = document.getElementById('folderStatus');
  const btn = document.getElementById('folderBtn');
  const ins = document.getElementById('dlInstruction');
  if (state === 'connected') {
    st.innerHTML    = '<span class="badge-connected">✓ 接続済み（直接保存モード）</span>';
    btn.textContent = '別のフォルダを選択';
    if (ins) ins.style.display = 'none';
  } else if (state === 'reconnect') {
    st.innerHTML    = '<span class="badge-reconnect">⚠ 前回のフォルダが見つかりました</span>';
    btn.textContent = '再接続する';
  } else {
    st.innerHTML    = '<span class="badge-none">未接続（Edgeでは自動読み込みが有効）</span>';
    btn.textContent = 'フォルダを選択';
  }
}

// ===== ファイル読み書き =====
async function readHandle(name) {
  if (!dataFolderHandle) return null;
  try {
    return JSON.parse(await (await (await dataFolderHandle.getFileHandle(name)).getFile()).text());
  } catch { return null; }
}
async function writeHandle(name, text) {
  if (!dataFolderHandle) return false;
  try {
    const fh = await dataFolderHandle.getFileHandle(name, { create: true });
    const w  = await fh.createWritable();
    await w.write(new TextEncoder().encode(text));
    await w.close();
    return true;
  } catch(e) { console.error(e); return false; }
}

// ===== 代替：webkitdirectory でフォルダ内ファイルを一括読み込み =====
function loadFromFileInput(files) {
  fileCache = {};
  const readers = [];
  for (const file of files) {
    if (!file.name.endsWith('.json')) continue;
    readers.push(new Promise(resolve => {
      const r = new FileReader();
      r.onload = e => {
        try { fileCache[file.name] = JSON.parse(e.target.result); } catch {}
        resolve();
      };
      r.readAsText(file, 'UTF-8');
    }));
  }
  Promise.all(readers).then(() => {
    if (fileCache['schedule.json']) {
      applyScheduleData(fileCache['schedule.json'], 'キャッシュから読み込みました');
    }
    const st = document.getElementById('folderStatus');
    st.innerHTML = '<span class="badge-connected">✓ 読み込み完了（代替モード）</span>';
    showMsg('dlMsg', '読み込み完了。保存後は手動で data/schedule.json に上書きしてください。', 'warn');
  });
}

// ===== schedule.json 読み込み =====
async function loadScheduleFromHandle() {
  const data = await readHandle('schedule.json');
  if (data) applyScheduleData(data, 'フォルダから読み込みました');
}
async function tryFetchSchedule() {
  try {
    const r = await fetch('data/schedule.json');
    if (r.ok) applyScheduleData(await r.json(), '自動読み込みしました');
  } catch {}
}
function applyScheduleData(data, chipMsg) {
  events    = (data.events    || []);
  recurring = (data.recurring || []);
  events.sort((a, b) => a.date < b.date ? -1 : 1);
  renderTables();
  renderTodayBox();
  document.getElementById('loadChip').innerHTML =
    `<span class="status-chip">✓ schedule.json ${escHtml(chipMsg)}</span>`;
}

// ===== 今日ボックス =====
function renderTodayBox() {
  const ts    = fmtDate(new Date());
  const items = getScheduleForDate(ts, { recurring, events });
  const box   = document.getElementById('todayBox');
  if (!items.length) { box.innerHTML = ''; return; }
  box.innerHTML = `<div class="today-box">
    <strong>本日（${fmtDateJP(ts)}）に該当する予定</strong>
    <ul>${items.map(t => `<li>${escHtml(t)}</li>`).join('')}</ul>
  </div>`;
}

// ===== 動的フィールド =====
function updateExtraFields() {
  const p    = document.getElementById('recPattern').value;
  const area = document.getElementById('extraFields');
  let html   = '';
  if (p === 'every-week' || p === 'every-2weeks' || p === 'every-2months') {
    html = `<div class="form-group"><label>曜日</label>
      <select id="recDow">
        <option value="1">月曜</option><option value="2">火曜</option>
        <option value="3">水曜</option><option value="4">木曜</option>
        <option value="5">金曜</option>
      </select></div>`;
  } else if (p === 'every-month-week') {
    html = `<div class="form-group"><label>第N週</label>
      <select id="recWeek">
        <option value="1">第1</option><option value="2">第2</option>
        <option value="3">第3</option><option value="4">第4</option>
      </select></div>
      <div class="form-group"><label>曜日</label>
      <select id="recDow">
        <option value="1">月曜</option><option value="2">火曜</option>
        <option value="3">水曜</option><option value="4">木曜</option>
        <option value="5">金曜</option>
      </select></div>`;
  } else if (p === 'every-month-day') {
    html = `<div class="form-group"><label>日付（1〜31）</label>
      <input type="number" id="recDay" min="1" max="31" value="1" style="width:70px;"></div>`;
  }
  area.innerHTML = html;
}

// ===== 単発予定追加 =====
function addEvent() {
  const date  = document.getElementById('evDate').value;
  const title = document.getElementById('evTitle').value.trim();
  if (!date)  { showMsg('evMsg', '日付を入力してください。', 'warn'); return; }
  if (!title) { showMsg('evMsg', 'タイトルを入力してください。', 'warn'); return; }
  events.push({ date, title });
  events.sort((a, b) => a.date < b.date ? -1 : 1);
  document.getElementById('evTitle').value = '';
  renderTables(); renderTodayBox();
  showMsg('evMsg', `追加しました：${title}`, 'success');
}

// ===== 一括取り込み =====
function bulkImport() {
  const text = document.getElementById('pasteArea').value.trim();
  if (!text) { showMsg('pasteMsg', 'データを貼り付けてください。', 'warn'); return; }
  let added = 0, skipped = 0;
  for (const line of text.split(/\r?\n/).filter(l => l.trim())) {
    const parts = line.split('\t');
    if (parts.length < 2) { skipped++; continue; }
    const date  = parseDate(parts[0].trim());
    const title = parts[1].trim();
    if (!date || !title) { skipped++; continue; }
    events.push({ date, title }); added++;
  }
  events.sort((a, b) => a.date < b.date ? -1 : 1);
  document.getElementById('pasteArea').value = '';
  renderTables(); renderTodayBox();
  showMsg('pasteMsg', `${added}件追加${skipped > 0 ? `、${skipped}件スキップ` : ''}しました。`, added > 0 ? 'success' : 'warn');
}

function parseDate(raw) {
  raw = raw.trim();
  if (/^\d{4}-\d{1,2}-\d{1,2}$/.test(raw)) { const [y,m,d]=raw.split('-').map(Number); return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
  if (/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(raw)) { const [y,m,d]=raw.split('/').map(Number); return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
  if (/^\d{1,2}\/\d{1,2}$/.test(raw)) { const [m,d]=raw.split('/').map(Number); const y=new Date().getFullYear(); return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
  return null;
}

// ===== 定例追加 =====
function addRecurring() {
  const title   = document.getElementById('recTitle').value.trim();
  const pattern = document.getElementById('recPattern').value;
  if (!title) { showMsg('recMsg', 'タイトルを入力してください。', 'warn'); return; }
  const item = { title, rule: pattern };
  if (pattern === 'every-week' || pattern === 'every-2weeks' || pattern === 'every-2months') {
    item.dow = parseInt(document.getElementById('recDow').value);
  } else if (pattern === 'every-month-week') {
    item.week = parseInt(document.getElementById('recWeek').value);
    item.dow  = parseInt(document.getElementById('recDow').value);
  } else if (pattern === 'every-month-day') {
    item.day = parseInt(document.getElementById('recDay').value);
  }
  recurring.push(item);
  document.getElementById('recTitle').value = '';
  renderTables(); renderTodayBox();
  showMsg('recMsg', `定例を追加しました：${title}`, 'success');
}

// ===== テーブル描画 =====
function renderTables() {
  const todayStr = fmtDate(new Date());

  const evBody = document.getElementById('eventTableBody');
  if (!events.length) {
    evBody.innerHTML = '<tr><td colspan="3" style="color:#aaa;font-style:italic;text-align:center;padding:16px;">登録なし</td></tr>';
  } else {
    evBody.innerHTML = events.map((ev, i) => {
      const isToday = ev.date === todayStr;
      return `<tr class="${isToday ? 'highlight-today' : ''}">
        <td>${escHtml(ev.date)}</td>
        <td>${escHtml(ev.title)}${isToday ? ' <span style="background:#e6b030;color:#fff;border-radius:3px;font-size:0.72rem;padding:1px 5px;">今日</span>' : ''}</td>
        <td><button class="btn-del" onclick="removeEvent(${i})">削除</button></td>
      </tr>`;
    }).join('');
  }

  const recBody = document.getElementById('recurTableBody');
  if (!recurring.length) {
    recBody.innerHTML = '<tr><td colspan="3" style="color:#aaa;font-style:italic;text-align:center;padding:16px;">登録なし</td></tr>';
  } else {
    recBody.innerHTML = recurring.map((r, i) =>
      `<tr>
        <td>${escHtml(describeRule(r))}</td>
        <td>${escHtml(r.title)}</td>
        <td><button class="btn-del" onclick="removeRecurring(${i})">削除</button></td>
      </tr>`
    ).join('');
  }
}

function describeRule(r) {
  switch (r.rule) {
    case 'every-week':       return `毎週${DOW_LABELS[r.dow]}曜`;
    case 'every-2weeks':     return `隔週${DOW_LABELS[r.dow]}曜`;
    case 'every-month-week': return `毎月第${r.week}週${DOW_LABELS[r.dow]}曜`;
    case 'every-month-day':  return `毎月${r.day}日`;
    case 'every-2months':    return `隔月${DOW_LABELS[r.dow]}曜`;
    default: return r.rule;
  }
}

function removeEvent(i)     { events.splice(i, 1);    renderTables(); renderTodayBox(); }
function removeRecurring(i) { recurring.splice(i, 1); renderTables(); renderTodayBox(); }

// ===== 保存 =====
async function saveSchedule() {
  const json  = JSON.stringify({ recurring, events }, null, 2);
  const fname = 'schedule.json';

  // 1) フォルダハンドル直接書き込み
  if (dataFolderHandle) {
    if (await writeHandle(fname, json)) {
      showMsg('dlMsg', '✓ data/schedule.json に保存しました。', 'success');
      return;
    }
    showMsg('dlMsg', '直接保存に失敗しました。ダウンロードを試みます。', 'warn');
  }

  // 2) 保存ダイアログ
  if (window.showSaveFilePicker) {
    try {
      const h = await window.showSaveFilePicker({
        suggestedName: fname,
        types: [{ description: 'JSON', accept: {'application/json': ['.json']} }]
      });
      const w = await h.createWritable();
      await w.write(new TextEncoder().encode(json));
      await w.close();
      showMsg('dlMsg', '✓ schedule.json を保存しました。', 'success');
      return;
    } catch(e) { if (e.name === 'AbortError') return; }
  }

  // 3) フォールバック：ブラウザダウンロード
  const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a'); a.href = url; a.download = fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  document.getElementById('dlInstruction').style.display = 'block';
  showMsg('dlMsg', 'schedule.json をダウンロードしました。data/ フォルダに上書き保存してください。', 'success');
}

// ===== ユーティリティ =====
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDateJP(ds) {
  const d = new Date(ds + 'T00:00:00');
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${'日月火水木金土'[d.getDay()]}）`;
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showMsg(id, text, type) {
  const el = document.getElementById(id); if (!el) return;
  el.innerHTML = `<div class="msg msg-${type}">${escHtml(text)}</div>`;
  setTimeout(() => { el.innerHTML = ''; }, 5000);
}

// ===== 予定マスター判定 =====
function getScheduleForDate(ds, sch) {
  const date = new Date(ds + 'T00:00:00'), res = [];
  for (const it of (sch.recurring||[])) if (matchesRule(date, it)) res.push(`【定例】${it.title}`);
  for (const ev of (sch.events||[]))    if (ev.date === ds)        res.push(ev.title);
  return res;
}
function matchesRule(date, item) {
  const dow = date.getDay();
  switch (item.rule) {
    case 'every-week': return dow === item.dow;
    case 'every-2weeks': {
      if (dow !== item.dow) return false;
      const wk = Math.floor((date - new Date('2025-01-06T00:00:00')) / (7 * 86400000));
      return wk >= 0 && wk % 2 === 0;
    }
    case 'every-month-week': {
      if (dow !== item.dow) return false;
      const y = date.getFullYear(), mo = date.getMonth(), d = date.getDate();
      let cnt = 0; for (let x = 1; x <= d; x++) if (new Date(y, mo, x).getDay() === item.dow) cnt++;
      return cnt === item.week;
    }
    case 'every-month-day': return date.getDate() === item.day;
    case 'every-2months': {
      if (dow !== item.dow) return false;
      return ((date.getFullYear() - 2025) * 12 + date.getMonth()) % 2 === 0;
    }
    default: return false;
  }
}
