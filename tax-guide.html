<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>所得税・住民税 控除ガイド（令和7年改正対応）</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {

    --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;

    --warning-bg: #faeeda; --warning-text: #633806;
    --danger-bg: #fcebeb; --danger-text: #791f1f; --danger-border: #e24b4a;

  }

      --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #333330;
      --text: #e8e6de; --text2: #a8a69e; --text3: #6e6c66;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
      --info-bg: #0c2d4a; --info-text: #85b7eb; --info-border: #185fa5;
      --success-bg: #173404; --success-text: #97c459;
      --warning-bg: #2a1c08; --warning-text: #ef9f27;

  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; font-size: 14px; background: var(--bg3); color: var(--text); min-height: 100vh; line-height: 1.6; }

  .revision { font-size: 11px; font-weight: 500; background: var(--warning-bg); color: var(--warning-text); border-radius: var(--radius); padding: 3px 8px; }
  .updated { font-size: 11px; color: var(--text3); margin-left: auto; }
  .layout { display: flex; min-height: calc(100vh - 49px); }
  .sidebar { width: 320px; flex-shrink: 0; background: var(--bg); border-right: 0.5px solid var(--border); padding: 18px 16px; overflow-y: auto; position: sticky; top: 0; max-height: calc(100vh - 49px); }

  .sec { margin-bottom: 18px; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; }

  .chip:hover { background: var(--bg2); }
  .chip.sel { background: var(--info-bg); color: var(--info-text); border-color: var(--info-border); font-weight: 500; }
  .inc-block { border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; background: var(--bg); margin-bottom: 8px; }
  .inc-block-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .inc-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .inc-row:last-child { margin-bottom: 0; }
  .inc-row label { font-size: 12px; color: var(--text2); min-width: 90px; }
  .inc-row input[type=number] { width: 96px; padding: 5px 8px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 13px; background: var(--bg); color: var(--text); }
  .inc-row .unit { font-size: 12px; color: var(--text2); }
  .inc-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .inc-result { font-size: 12px; color: var(--text2); margin-top: 8px; padding-top: 8px; border-top: 0.5px solid var(--border); }
  .inc-result span { font-weight: 500; color: var(--text); }
  select { font-size: 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 4px 8px; background: var(--bg); color: var(--text); cursor: pointer; }
  .add-btn { width: 100%; padding: 7px 0; border: 0.5px dashed var(--border2); border-radius: var(--radius); font-size: 12px; cursor: pointer; background: transparent; color: var(--text2); text-align: center; transition: all .12s; margin-top: 4px; }

  .total-box { margin-top: 10px; padding: 10px 14px; background: var(--bg2); border-radius: var(--radius); font-size: 12px; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .total-label { color: var(--text2); white-space: nowrap; padding-top: 1px; }
  .total-val { font-size: 13px; font-weight: 500; color: var(--text); text-align: right; }
  .total-val.ok { color: var(--success-text); }
  .total-val.ng { color: var(--danger-text); }
  .clear-btn { font-size: 11px; color: var(--text2); background: none; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 2px 8px; cursor: pointer; }
  .clear-btn:hover { background: var(--bg2); }
  .remove-btn { font-size: 11px; color: var(--danger-text); background: none; border: 0.5px solid var(--danger-border); border-radius: var(--radius); padding: 2px 8px; cursor: pointer; }
  .remove-btn:hover { background: var(--danger-bg); }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 16px 0; }
  .results-heading { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  .result-count { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: border-color .15s; }
  .card:hover { border-color: var(--border2); }
  .card.open { border-color: var(--info-border); }
  .card-head { display: flex; align-items: flex-start; gap: 10px; }
  .badge { flex-shrink: 0; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: var(--radius); white-space: nowrap; }
  .b-blue  { background: var(--info-bg);    color: var(--info-text); }
  .b-green { background: var(--success-bg); color: var(--success-text); }
  .b-amber { background: var(--warning-bg); color: var(--warning-text); }
  .b-red   { background: var(--danger-bg);  color: var(--danger-text); }
  .card-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .new-tag { font-size: 10px; font-weight: 500; background: #EEEDFE; color: #3C3489; border-radius: 4px; padding: 1px 5px; margin-left: 6px; vertical-align: middle; }
  .card-desc { font-size: 12px; color: var(--text2); }
  .chevron { margin-left: auto; flex-shrink: 0; font-size: 11px; color: var(--text3); transition: transform .2s; }
  .card.open .chevron { transform: rotate(180deg); }
  .detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--border); }
  .card.open .detail { display: block; }
  .cond-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 13px; }
  .cond-lbl { flex-shrink: 0; width: 80px; font-size: 11px; font-weight: 500; color: var(--text2); padding-top: 1px; }
  .cond-val { color: var(--text); line-height: 1.5; }
  .cond-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .amt-box { margin-top: 10px; background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; }
  .amt-title { font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  .amt-table { width: 100%; font-size: 12px; border-collapse: collapse; }
  .amt-table th { text-align: left; font-weight: 400; color: var(--text2); padding: 3px 8px 3px 0; vertical-align: top; }
  .amt-table td { font-weight: 500; color: var(--text); padding: 3px 0; vertical-align: top; }
  .note { font-size: 11px; color: var(--text2); margin-top: 8px; line-height: 1.6; }
  .note b { font-weight: 500; color: var(--text); }
  .guide { font-size: 13px; color: var(--text2); text-align: center; padding: 40px 0; }
  .empty { text-align: center; padding: 40px 0; font-size: 13px; color: var(--text2); }
  @media (max-width: 680px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; max-height: none; position: static; border-right: none; border-bottom: 0.5px solid var(--border); }
    .main { padding: 16px; }
    .updated { display: none; }
  }
</style>
</head>

<div class="page-header">

<script>
document.getElementById('updated-label').textContent = 'データ更新日: ' + DATA_UPDATED;

const state = { rel: null, age: null, special: new Set(), selfIncome: null };
let incomeBlocks = [];
let blockId = 0;

const INC_TYPES = [
  { val: 'salary',   label: '給与収入' },
  { val: 'pension',  label: '年金収入' },
  { val: 'business', label: '事業収入' },
  { val: 'other',    label: 'その他収入' },
];

function matchDeduction(d, tot) {
  const r = d.matchRule;
  if (!r) return false;
  if (r.rel    && state.rel !== r.rel)                            return false;
  if (r.relNot && state.rel === r.relNot)                        return false;
  if (r.ageIn  && (!state.age || !r.ageIn.includes(state.age))) return false;
  if (r.special && !state.special.has(r.special))                return false;
  if (r.specialNot) { for (const s of r.specialNot) { if (state.special.has(s)) return false; } }
  if (r.incomeMax !== undefined) {
    if (tot === null) { if (r.incomeMin !== undefined) return false; }
    else if (tot > r.incomeMax) return false;
  }
  if (r.incomeMin !== undefined) { if (tot === null || tot <= r.incomeMin) return false; }
  return true;
}

function calcDeduction(type, gross, dm, is65) {
  if (type === 'salary') {
    if (gross <= 162.5) return 65;
    if (gross <= 180)   return gross * 0.4 - 10;
    if (gross <= 360)   return gross * 0.3 + 8;
    if (gross <= 660)   return gross * 0.2 + 44;
    if (gross <= 850)   return gross * 0.1 + 110;
    return 195;
  }
  if (type === 'pension') {
    if (is65) {
      if (gross <= 330)  return 110;
      if (gross <= 410)  return gross * 0.25 + 27.5;
      if (gross <= 770)  return gross * 0.15 + 68.5;
      if (gross <= 1000) return gross * 0.05 + 145.5;
      return 195.5;
    } else {
      if (gross <= 130)  return 60;
      if (gross <= 410)  return gross * 0.25 + 27.5;
      if (gross <= 770)  return gross * 0.15 + 68.5;
      if (gross <= 1000) return gross * 0.05 + 145.5;
      return 195.5;
    }
  }
  if (type === 'business') return isNaN(dm) ? 0 : dm;
  return 0;
}

function blockIncome(b) {
  const gross = parseFloat(b.gross) || 0;
  const dm    = parseFloat(b.deductManual) || 0;
  return Math.max(0, gross - calcDeduction(b.type, gross, dm, state.age === '70plus'));
}

function totalIncome() {
  if (!incomeBlocks.length) return null;
  if (!incomeBlocks.some(b => b.gross !== '' && !isNaN(parseFloat(b.gross)))) return null;
  return incomeBlocks.reduce((s, b) => s + blockIncome(b), 0);
}

function addIncomeBlock() {
  incomeBlocks.push({ id: ++blockId, type: 'salary', gross: '', deductManual: '' });
  renderIncomeBlocks(); render();
}
function removeIncomeBlock(id) {
  incomeBlocks = incomeBlocks.filter(b => b.id !== id);
  renderIncomeBlocks(); render();
}
function clearAllIncome() {
  incomeBlocks = [{ id: ++blockId, type: 'salary', gross: '', deductManual: '' }];
  renderIncomeBlocks(); render();
}
function updateBlock(id, field, val) {
  const b = incomeBlocks.find(b => b.id === id);
  if (b) b[field] = val;
  updateIncomeResults(); render();
}

function blockHTML(b) {
  const is65     = state.age === '70plus';
  const typeOpts = INC_TYPES.map(t => `<option value="${t.val}"${t.val===b.type?' selected':''}>${t.label}</option>`).join('');
  const rowLabel = b.type==='business' ? '収入（売上）' : b.type==='other' ? '収入または所得' : (INC_TYPES.find(t=>t.val===b.type)?.label||'');
  let hint = '', extraRow = '';
  if      (b.type==='salary')   hint = '給与所得控除が自動計算されます（最低保障65万円）';
  else if (b.type==='pension')  hint = is65 ? '65歳以上：公的年金等控除が自動計算されます（最低保障110万円）' : '65歳未満：公的年金等控除が自動計算されます（最低保障60万円）';
  else if (b.type==='business') {
    extraRow = `<div class="inc-row" style="margin-top:6px"><label>必要経費・控除額</label><input type="number" id="dm-${b.id}" min="0" step="0.1" placeholder="例：80" value="${b.deductManual}" onchange="updateBlock(${b.id},'deductManual',this.value)"><span class="unit">万円</span></div>`;
    hint = '事業所得＝収入－必要経費。青色申告控除（最大65万円）も含めて入力してください。';
  }
  else if (b.type==='other') hint = '一時所得・雑所得など。控除がない場合は収入金額をそのまま所得として入力してください。';
  return `
    <div class="inc-block" id="blk-${b.id}">
      <div class="inc-block-head">
        <select onchange="updateBlock(${b.id},'type',this.value)">${typeOpts}</select>
        <button class="remove-btn" onclick="removeIncomeBlock(${b.id})">削除</button>
      </div>
      <div class="inc-row">
        <label>${rowLabel}</label>
        <input type="number" id="gr-${b.id}" min="0" step="0.1" placeholder="例：120" value="${b.gross}" onchange="updateBlock(${b.id},'gross',this.value)">
        <span class="unit">万円</span>
      </div>
      ${extraRow}
      ${hint ? `<div class="inc-hint">${hint}</div>` : ''}
      <div class="inc-result" id="res-${b.id}" style="display:none"></div>
    </div>`;
}

function renderIncomeBlocks() {
  document.getElementById('inc-blocks').innerHTML = incomeBlocks.map(blockHTML).join('');
  updateIncomeResults();
}

function updateIncomeResults() {
  const totalBox   = document.getElementById('total-box');
  const totalValEl = document.getElementById('total-val');
  incomeBlocks.forEach(b => {
    const el = document.getElementById('res-' + b.id);
    if (!el) return;
    const gross      = parseFloat(b.gross) || 0;
    const is65       = state.age === '70plus';
    const dm         = parseFloat(b.deductManual) || 0;
    const deduct     = calcDeduction(b.type, gross, dm, is65);
    const income     = Math.max(0, gross - deduct);
    const showResult = b.gross !== '' && !isNaN(parseFloat(b.gross));
    if (showResult) {
      el.style.display = '';
      el.innerHTML = `所得（概算）：<span>${Math.round(income*10)/10} 万円</span>${b.type==='other'?'（入力値をそのまま使用）':`（控除 ${Math.round(deduct*10)/10} 万円）`}`;
    } else {
      el.style.display = 'none';
      el.innerHTML = '';
    }
  });
  const tot = totalIncome();
  if (tot !== null) {
    totalBox.style.display = 'flex';
    const r = Math.round(tot * 10) / 10;
    const ok = r <= 58;
    totalValEl.className = 'total-val' + (ok ? ' ok' : ' ng');
    totalValEl.textContent = `${r} 万円　${ok ? '→ 控除対象の所得範囲内（58万円以下）' : '→ 58万円超（一般扶養・配偶者控除の対象外）'}`;
  } else {
    totalBox.style.display = 'none';
  }
}

function updateSelfIncome(val) {
  state.selfIncome = val === '' ? null : parseFloat(val);
  updateSelfIncomeNote();
  render();
}
function clearSelfIncome() {
  state.selfIncome = null;
  document.getElementById('self-income').value = '';
  updateSelfIncomeNote();
  render();
}
function updateSelfIncomeNote() {
  const el = document.getElementById('self-income-note');
  if (!el) return;
  const v = state.selfIncome;
  if (v === null) {
    el.style.color = 'var(--text3)';
    el.textContent = '空欄の場合は1,000万円未満として判定します';
  } else if (v > 1000) {
    el.style.color = 'var(--danger-text)';
    el.textContent = '1,000万円超：配偶者控除・配偶者特別控除は適用不可';
  } else if (v > 950) {
    el.style.color = 'var(--warning-text)';
    el.textContent = '950万円超〜1,000万円以下：配偶者控除の控除額が減額（13万円）';
  } else if (v > 900) {
    el.style.color = 'var(--warning-text)';
    el.textContent = '900万円超〜950万円以下：配偶者控除の控除額が減額（26万円）';
  } else if (v > 500) {
    el.style.color = 'var(--warning-text)';
    el.textContent = 'ひとり親控除・寡婦控除は適用不可（所得500万円以下が要件）';
  } else {
    el.style.color = 'var(--success-text)';
    el.textContent = 'すべての控除の所得要件を満たしています';
  }
}
function selOne(type, el) {
  document.querySelectorAll('#chips-'+type+' .chip').forEach(c => c.classList.remove('sel'));
  if (state[type] === el.dataset.val) state[type] = null;
  else { el.classList.add('sel'); state[type] = el.dataset.val; }
  updateAgeChips();
  renderIncomeBlocks(); render();
}
function updateAgeChips() {
  const ageChips = document.querySelectorAll('#chips-age .chip');
  if (state.rel === 'spouse') {
    ageChips.forEach(c => { c.style.opacity = '0.3'; c.style.pointerEvents = 'none'; });
    if (state.age) { state.age = null; ageChips.forEach(c => c.classList.remove('sel')); }
  } else {
    ageChips.forEach(c => { c.style.opacity = ''; c.style.pointerEvents = ''; });
  }
}
function selMulti(el) {
  const v = el.dataset.val;
  if (state.special.has(v)) { state.special.delete(v); el.classList.remove('sel'); }
  else { state.special.add(v); el.classList.add('sel'); }
  render();
}
function resetSpecial() {
  state.special.clear();
  document.querySelectorAll('#chips-special .chip').forEach(c => c.classList.remove('sel'));
  render();
}

function render() {
  const tot       = totalIncome();
  const self      = state.selfIncome;
  const hasFilter = state.rel || state.age || state.special.size > 0 || incomeBlocks.some(b => b.gross!==''&&!isNaN(parseFloat(b.gross)));
  const countEl   = document.getElementById('result-count');
  const container = document.getElementById('results');

  // 本人所得による除外を適用してmatchedを生成
  const matched = DEDUCTIONS.filter(d => {
    if (!matchDeduction(d, tot)) return false;
    if (self !== null) {
      if (self > 1000 && (d.id === 'spouse_ctrl' || d.id === 'spouse_special')) return false;
      if (self > 500  && (d.id === 'single_parent' || d.id === 'widow')) return false;
    }
    return true;
  });

  if (!hasFilter) { countEl.textContent=''; container.innerHTML='<div class="guide">左の条件を選択すると、該当する控除が表示されます。</div>'; return; }

  // 続柄のみ選択・年齢未選択の場合（配偶者以外）
  if (state.rel && state.rel !== 'spouse' && !state.age && state.special.size === 0 && !incomeBlocks.some(b => b.gross!==''&&!isNaN(parseFloat(b.gross)))) {
    countEl.textContent = '';
    container.innerHTML = '<div class="guide">次に「年齢」を選択してください。</div>';
    return;
  }

  // 本人所得1,000万円超で配偶者を選択している場合
  if (self !== null && self > 1000 && state.rel === 'spouse') {
    countEl.textContent = '';
    container.innerHTML = '<div class="empty">お客様の合計所得が1,000万円超のため、<br>配偶者控除・配偶者特別控除は適用対象外です。<br><br>特別事情（障害など）がある場合は下のチップから選択してください。</div>';
    return;
  }

  // 配偶者で所得133万円超の場合
  if (state.rel === 'spouse' && tot !== null && tot > 133) {
    countEl.textContent = '';
    container.innerHTML = '<div class="empty">配偶者の合計所得が133万円超（給与収入201万円超）のため、<br>配偶者控除・配偶者特別控除ともに適用対象外です。<br><br>特別事情（障害・ひとり親など）がある場合は下のチップから選択してください。</div>';
    return;
  }

  countEl.textContent = matched.length > 0 ? `${matched.length}件の控除が該当します` : '';
  if (!matched.length) { container.innerHTML='<div class="empty">選択した条件では該当する控除がありません。<br>条件を変えてお試しください。</div>'; return; }
  container.innerHTML = matched.map(d => `
    <div class="card" id="dc-${d.id}" onclick="toggle('${d.id}')">
      <div class="card-head">
        <span class="badge ${d.badge}">${d.badgeText}</span>
        <div style="flex:1">
          <div class="card-title">${d.title}${d.isNew?'<span class="new-tag">令和7年新設</span>':''}</div>
          <div class="card-desc">${d.desc}</div>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="detail">
        <div style="margin-bottom:10px">
          ${(d.conditions||[]).map(c=>`<div class="cond-row"><span class="cond-lbl">${c.label}</span><div><span class="cond-val">${c.value}</span>${c.sub?`<div class="cond-sub">└ ${c.sub}</div>`:''}</div></div>`).join('')}
        </div>
        <div class="amt-box">
          <div class="amt-title">控除額（所得税 / 住民税）</div>
          <table class="amt-table">${(d.amounts||[]).map(a=>`<tr><th>${a.cond}</th><td>${a.amount}</td></tr>`).join('')}</table>
        </div>
        ${d.note?`<p class="note"><b>注意点：</b>${d.note}</p>`:''}
      </div>
    </div>`).join('');
}

function toggle(id) { document.getElementById('dc-'+id)?.classList.toggle('open'); }

incomeBlocks.push({ id: ++blockId, type: 'salary', gross: '', deductManual: '' });
renderIncomeBlocks();
render();
</script>
</body>
</html>
