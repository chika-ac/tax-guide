<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務ポータル</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --text: #1a1a18;
    --muted: #6b6b67;
    --accent: #3c3489;
    --soft: #ededfc;
    --shadow: 0 1px 6px rgba(0,0,0,0.06);
    --radius: 10px;
  }

  body {
    font-family: "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ─── HEADER ─── */
  header {
    background: var(--surface);
    box-shadow: var(--shadow);
    padding: 0 2rem;
  }
  .header-inner {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
  }
  .header-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--accent);
  }
  .header-link {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    gap: 12px;
  }
  .header-link a {
    color: var(--muted);
    font-size: 12px;
  }
  .header-link a:hover { color: var(--accent); }

  /* ─── MAIN ─── */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 2.5rem 2rem 4rem;
  }

  /* ─── HERO ─── */
  .hero {
    display: flex;
    align-items: flex-start;
    gap: 1.5rem;
    margin-bottom: 3rem;
  }
  .hero-text { flex: 1; }
  .hero-date {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 0.25rem;
  }
  .hero-message {
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.6;
  }
  .hero-message-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .mascot {
    width: 72px;
    height: 72px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ─── MORNING LINKS ─── */
  .morning-links {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 0.75rem;
    font-size: 13px;
    color: var(--muted);
  }
  .morning-links a {
    color: var(--muted);
    font-size: 13px;
  }
  .morning-links a:hover { color: var(--accent); }
  .morning-sep { color: #ccc; margin: 0 4px; }

  /* ─── SECTION ─── */
  .section { margin-bottom: 2.5rem; }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid #e8e8e4;
  }

  /* ─── APP GRID ─── */
  .app-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }
  .app-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 1rem 1.1rem;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: box-shadow 0.15s, transform 0.15s;
    cursor: pointer;
  }
  .app-card:hover {
    box-shadow: 0 3px 14px rgba(0,0,0,0.1);
    transform: translateY(-1px);
    text-decoration: none;
  }
  .app-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--soft);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .app-icon svg { width: 18px; height: 18px; }
  .app-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }
  .event-card .app-icon {
    background: #faeeda;
  }

  /* ─── LINK CHECK MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 14px;
    padding: 1.75rem 2rem;
    width: min(540px, 92vw);
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-close {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 20px;
    color: var(--muted);
    line-height: 1;
    padding: 2px 6px;
  }
  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    font-size: 13px;
    border-bottom: 1px solid #f0f0ec;
  }
  .check-item:last-child { border-bottom: none; }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .badge-ok { background: #eaf3de; color: #3b6d11; }
  .badge-ng { background: #fcebeb; color: #a32d2d; }
  .badge-checking { background: #faeeda; color: #854f0b; }
  .check-url { color: var(--muted); font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-check {
    display: inline-block;
    margin-top: 1rem;
    padding: 8px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-check:disabled { opacity: 0.5; cursor: default; }

  /* ─── FOOTER ─── */
  footer {
    text-align: center;
    font-size: 11px;
    color: #ccc;
    padding: 2rem;
  }

  /* ─── ADMIN TRIGGER ─── */
  .admin-trigger {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 12px;
    height: 12px;
    background: transparent;
    cursor: pointer;
    z-index: 50;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="header-title">業務ポータル</span>
  </div>
</header>

<main>
  <!-- HERO -->
  <div class="hero">
    <div class="hero-text">
      <p class="hero-date" id="todayDate"></p>
      <p class="hero-message-label">今日のひとこと</p>
      <p class="hero-message" id="dailyMessage">読み込み中…</p>
      <div id="morningLinks" class="morning-links"></div>
    </div>
    <div class="mascot">
      <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="36" cy="36" r="32" fill="#eeedfe"/>
        <ellipse cx="36" cy="38" rx="16" ry="14" fill="#7f77dd"/>
        <circle cx="36" cy="26" r="11" fill="#7f77dd"/>
        <circle cx="31" cy="25" r="2.5" fill="white"/>
        <circle cx="41" cy="25" r="2.5" fill="white"/>
        <circle cx="31.8" cy="25.8" r="1.2" fill="#26215c"/>
        <circle cx="41.8" cy="25.8" r="1.2" fill="#26215c"/>
        <path d="M32 30 Q36 33 40 30" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <ellipse cx="27" cy="28" rx="3" ry="2" fill="#afa9ec" opacity="0.7"/>
        <ellipse cx="45" cy="28" rx="3" ry="2" fill="#afa9ec" opacity="0.7"/>
      </svg>
    </div>
  </div>

  <!-- 定常業務 -->
  <section class="section">
    <p class="section-label">定常業務</p>
    <div class="app-grid" id="regularApps"></div>
  </section>

  <!-- イベント業務 -->
  <section class="section">
    <p class="section-label">イベント業務</p>
    <div class="app-grid" id="eventApps"></div>
  </section>
</main>

<footer>業務ポータル &copy; <span id="fyYear"></span></footer>

<!-- 管理者用リンクチェックモーダル -->
<div class="modal-overlay" id="checkModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">リンク到達確認</span>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div id="checkResults"></div>
    <button class="btn-check" id="runCheckBtn" onclick="runLinkCheck()">チェック開始</button>
  </div>
</div>

<!-- 管理者トリガー（右下コーナー・不可視） -->
<div class="admin-trigger" id="adminTrigger" title=""></div>

<script>
  /* ─── 業務データ ─── */
  const morningFiles = [
    { team: "Aチーム", label: "朝礼資料", url: "files/朝礼_A.xlsx" },
    { team: "Bチーム", label: "朝礼資料", url: "files/朝礼_B.pptx" }
  ];
  const regularApps = [
    { name: "給与手当（認定）",       url: "apps/teamA/salary_certification.html" },
    { name: "給与手当（ヘルプデスク）", url: "apps/teamB/salary_helpdesk.html" }
  ];
  const eventApps = [
    { name: "年末調整", url: "apps/teamA/yearend_tax.html" }
  ];

  /* ─── 年度ロジック（4/1開始） ─── */
  function getFiscalDayIndex() {
    const today = new Date();
    const y = today.getFullYear();
    const m = today.getMonth(); // 0-based
    const fiscalYear = m >= 3 ? y : y - 1;
    const start = new Date(fiscalYear, 3, 1); // 4月1日
    return Math.floor((today - start) / 86400000);
  }

  function isLeapDay() {
    const today = new Date();
    return today.getMonth() === 1 && today.getDate() === 29; // 2月29日
  }

  /* ─── 今日の日付表示 ─── */
  function formatDate(d) {
    const days = ["日","月","火","水","木","金","土"];
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
  }
  document.getElementById("todayDate").textContent = formatDate(new Date());
  document.getElementById("fyYear").textContent = new Date().getFullYear();

  /* ─── ひとこと表示（外部JSロード後に呼ばれる） ─── */
  function showDailyMessage() {
    const el = document.getElementById("dailyMessage");
    const fallback = "今日もよろしくお願いします。";
    if (isLeapDay()) {
      el.textContent = (typeof leapDayMessage !== "undefined" && leapDayMessage)
        ? leapDayMessage : fallback;
    } else {
      const idx = getFiscalDayIndex();
      if (typeof dailyMessages !== "undefined" && Array.isArray(dailyMessages)) {
        el.textContent = dailyMessages[idx % dailyMessages.length] || fallback;
      } else {
        el.textContent = fallback;
      }
    }
  }


  /* ─── 朝礼リンク描画 ─── */
  (function buildMorningLinks() {
    const container = document.getElementById("morningLinks");
    morningFiles.forEach((f, i) => {
      if (i > 0) {
        const sep = document.createElement("span");
        sep.className = "morning-sep";
        sep.textContent = "・";
        container.appendChild(sep);
      }
      const a = document.createElement("a");
      a.href = f.url;
      a.textContent = f.team + f.label;
      container.appendChild(a);
    });
  })();

  /* ─── アプリカード生成 ─── */
  const docIcon = `<svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="3" y="2" width="10" height="14" rx="2" fill="#7f77dd" opacity="0.15"/>
    <path d="M5 6h8M5 9h8M5 12h5" stroke="#534ab7" stroke-width="1.5" stroke-linecap="round"/>
  </svg>`;
  const calIcon = `<svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="4" width="14" height="12" rx="2" fill="#ef9f27" opacity="0.2"/>
    <path d="M2 8h14" stroke="#ba7517" stroke-width="1.2"/>
    <rect x="6" y="2" width="1.5" height="4" rx="0.75" fill="#ba7517"/>
    <rect x="10.5" y="2" width="1.5" height="4" rx="0.75" fill="#ba7517"/>
    <circle cx="6.5" cy="11.5" r="1.2" fill="#ba7517"/>
    <circle cx="11.5" cy="11.5" r="1.2" fill="#ba7517"/>
  </svg>`;

  function buildCards(apps, containerId, isEvent) {
    const container = document.getElementById(containerId);
    apps.forEach(app => {
      const a = document.createElement("a");
      a.href = app.url;
      a.className = "app-card" + (isEvent ? " event-card" : "");
      a.innerHTML = `
        <div class="app-icon">${isEvent ? calIcon : docIcon}</div>
        <span class="app-name">${app.name}</span>
      `;
      container.appendChild(a);
    });
  }
  buildCards(regularApps, "regularApps", false);
  buildCards(eventApps, "eventApps", true);

  /* ─── リンクチェック（管理者隠し機能） ─── */
  let clickCount = 0;
  let clickTimer = null;
  document.getElementById("adminTrigger").addEventListener("click", function() {
    clickCount++;
    clearTimeout(clickTimer);
    if (clickCount >= 5) {
      clickCount = 0;
      openModal();
    } else {
      clickTimer = setTimeout(() => { clickCount = 0; }, 2000);
    }
  });

  function openModal() {
    document.getElementById("checkModal").classList.add("open");
    document.getElementById("checkResults").innerHTML = "<p style='color:var(--muted);font-size:13px;'>「チェック開始」を押すとすべてのリンクの到達確認を行います。</p>";
    document.getElementById("runCheckBtn").disabled = false;
    document.getElementById("runCheckBtn").textContent = "チェック開始";
  }
  function closeModal() {
    document.getElementById("checkModal").classList.remove("open");
  }

  async function checkLink(url) {
    return new Promise(resolve => {
      const xhr = new XMLHttpRequest();
      xhr.open("HEAD", url, true);
      xhr.timeout = 5000;
      xhr.onload = () => resolve(xhr.status < 400 ? "ok" : "ng");
      xhr.onerror = () => resolve("ng");
      xhr.ontimeout = () => resolve("ng");
      try { xhr.send(); } catch(e) { resolve("ng"); }
    });
  }

  async function runLinkCheck() {
    const btn = document.getElementById("runCheckBtn");
    btn.disabled = true;
    btn.textContent = "確認中…";
    const allApps = [...regularApps, ...eventApps];
    const container = document.getElementById("checkResults");
    container.innerHTML = "";

    for (const app of allApps) {
      const item = document.createElement("div");
      item.className = "check-item";
      item.innerHTML = `<span class="badge badge-checking">確認中</span><span style="font-size:13px;flex:1;">${app.name}</span><span class="check-url">${app.url}</span>`;
      container.appendChild(item);

      const result = await checkLink(app.url);
      const badge = item.querySelector(".badge");
      badge.className = "badge " + (result === "ok" ? "badge-ok" : "badge-ng");
      badge.textContent = result === "ok" ? "OK" : "NG";
    }

    const ngItems = container.querySelectorAll(".badge-ng");
    const summary = document.createElement("p");
    summary.style.cssText = "font-size:13px;margin-top:1rem;color:var(--muted);";
    summary.textContent = ngItems.length === 0
      ? "✓ すべてのリンクに到達できました。"
      : `⚠ ${ngItems.length} 件のリンクに到達できませんでした。`;
    container.appendChild(summary);
    btn.textContent = "再チェック";
    btn.disabled = false;
  }

  /* モーダル外クリックで閉じる */
  document.getElementById("checkModal").addEventListener("click", function(e) {
    if (e.target === this) closeModal();
  });
</script>
<script src="data/daily_messages.js"></script>
<script src="data/daily_messages_leap.js"></script>
<script>showDailyMessage();</script>
</body>
</html>
