<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>朝礼お知らせ</title>

  <!--
  ====================================================================
    ★ 設定エリア（ここだけ編集してください）
  ====================================================================
    batUrl：HTMLと同じフォルダに置いた .bat ファイルの相対パス
    pdfUrl：current フォルダ内の PDF の相対パス
  ====================================================================
  -->
  <script>
    const TEAMS = [
      {
        key:    "teamA",
        label:  "チーム A",
        pdfUrl: "./current/teamA.pdf",
        batUrl: "./openTeamA.bat",
      },
      {
        key:    "teamB",
        label:  "チーム B",
        pdfUrl: "./current/teamB.pdf",
        batUrl: "./openTeamB.bat",
      },
      {
        key:    "teamC",
        label:  "チーム C",
        pdfUrl: "./current/teamC.pdf",
        batUrl: "./openTeamC.bat",
      },
      {
        key:    "teamD",
        label:  "チーム D",
        pdfUrl: "./current/teamD.pdf",
        batUrl: "./openTeamD.bat",
      },
    ];
  </script>
  <!-- ================================================================ -->

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #1A4C8E;
      --primary-lt: #2A6BC7;
      --bg:         #F4F6FA;
      --surface:    #FFFFFF;
      --border:     #D6DCEB;
      --text:       #1C2333;
      --text-sub:   #5A6378;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── ヘッダー ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 700; letter-spacing: .04em; }
    .header-date { margin-left: auto; font-size: .8rem; opacity: .75; }

    /* ── タブバー ── */
    .tab-bar {
      display: flex;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
      padding: 0 16px;
    }
    .tab-btn {
      height: 44px;
      padding: 0 24px;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: .92rem;
      font-weight: 500;
      color: var(--text-sub);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--primary-lt); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ── コンテンツ ── */
    .tab-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .tab-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .tab-panel.active { display: flex; }

    /* ── Excel リンクバー ── */
    .excel-bar {
      padding: 8px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .excel-label { font-size: .78rem; color: var(--text-sub); white-space: nowrap; }
    .excel-link {
      font-size: .82rem;
      font-weight: 500;
      color: var(--primary);
      text-decoration: none;
      padding: 4px 14px;
      border: 1px solid var(--primary);
      border-radius: 4px;
      transition: background .12s, color .12s;
      white-space: nowrap;
    }
    .excel-link:hover { background: var(--primary); color: #fff; }
    .excel-note { font-size: .73rem; color: var(--text-sub); }

    /* ── PDF iframe ── */
    .pdf-frame { flex: 1; width: 100%; border: none; display: block; }
  </style>
</head>

<body>

  <header>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9"/>
      <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
    <h1>朝礼お知らせ</h1>
    <span class="header-date" id="headerDate"></span>
  </header>

  <div class="tab-bar" id="tabBar"></div>
  <div class="tab-content" id="tabContent"></div>

  <script>
    (function() {
      var d = new Date();
      var days = ['日','月','火','水','木','金','土'];
      document.getElementById('headerDate').textContent =
        d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日（' + days[d.getDay()] + '）';
    })();

    var tabBar     = document.getElementById('tabBar');
    var tabContent = document.getElementById('tabContent');

    TEAMS.forEach(function(team, i) {

      /* タブボタン */
      var btn = document.createElement('button');
      btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
      btn.textContent = team.label;
      btn.dataset.key = team.key;
      btn.addEventListener('click', function() { switchTab(team.key); });
      tabBar.appendChild(btn);

      /* パネル */
      var panel = document.createElement('div');
      panel.className = 'tab-panel' + (i === 0 ? ' active' : '');
      panel.id = 'panel-' + team.key;

      /* Excel リンクバー */
      var bar = document.createElement('div');
      bar.className = 'excel-bar';
      bar.innerHTML =
        '<span class="excel-label">元ネタ Excel：</span>' +
        '<a class="excel-link" href="' + esc(team.batUrl) + '" download>Excel を開く</a>' +
        '<span class="excel-note">※ダウンロードされたファイルを実行してください</span>';
      panel.appendChild(bar);

      /* PDF iframe */
      var iframe = document.createElement('iframe');
      iframe.className = 'pdf-frame';
      iframe.src = team.pdfUrl;
      iframe.title = team.label + ' お知らせ';
      panel.appendChild(iframe);

      tabContent.appendChild(panel);
    });

    function switchTab(key) {
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.key === key);
      });
      document.querySelectorAll('.tab-panel').forEach(function(p) {
        p.classList.toggle('active', p.id === 'panel-' + key);
      });
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>

</body>
</html>
